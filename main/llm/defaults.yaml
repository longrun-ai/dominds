# Optional provider-level retry controls for kernel dialog driving:
# - llm_retry_aggressive_max_retries: front-loaded fast retries before Dominds automatically downgrades
#   to conservative slow retry (default 3). Automatic retries no longer stop just because a retry
#   count budget was exhausted.
# - llm_retry_initial_delay_ms: delay before the 1st retry (default 1000).
# - llm_retry_conservative_delay_ms: base delay for provider-classified conservative retries (default 30000; fixed for first 10 retries, then ramps by x1.5 with the normal max-delay cap).
# - llm_retry_backoff_multiplier: exponential factor between retries (default 1.5).
# - llm_retry_max_delay_ms: upper bound for retry delay (default 1800000 / 30m).
# - apiQuirks: optional provider/gateway quirk profile(s) for non-standard transport behavior
#   and provider-specific failure handling that can override the driver's default retry disposition.
#   Example: `apiQuirks: xcode.best` currently covers both keepalive/heartbeat stream quirks and
#   repeated empty-response deadlock detection for the same unchanged dialog context, plus conservative retry
#   classification for gateway-returned HTML 502 Bad Gateway pages and
#   `500 auth_unavailable: no auth available` infrastructure failures.
# - tool_result_max_chars: optional transport-level cap for a single tool-result text payload
#   before Dominds projects it into the provider request. Use this when a provider/gateway enforces
#   a stricter per-item string limit than Dominds' built-in defaults.
providers:
  codex:
    name: Codex (ChatGPT)
    apiType: codex
    baseUrl: https://chatgpt.com/backend-api/
    apiKeyEnvVar: CODEX_HOME
    tech_spec_url: https://platform.openai.com/docs/api-reference/responses
    api_mgmt_url: https://chatgpt.com/
    # `model_param_options` documents common `.minds/team.yaml` `model_params` fields
    # that this provider supports (as of this defaults.yaml).
    #
    # These are documentation hints for humans/agents; they are not auto-applied.
    model_param_options:
      codex:
        # Isolation principle:
        # - These hints describe the Codex wrapper only.
        # - Same-looking fields under `openai` are not aliases and are not fallback-compatible.
        reasoning_effort:
          prominent: true
          default: high
          # Trade latency/cost for quality on reasoning-capable models.
          # Allowed: none | minimal | low | medium | high | xhigh
          type: enum
          values: [none, minimal, low, medium, high, xhigh]
          description: Reasoning effort level (when supported by the model).
        reasoning_summary:
          type: enum
          default: auto
          values: [auto, concise, detailed, none]
          description: Reasoning summary detail level (when supported by the model).
        service_tier:
          prominent: true
          type: enum
          # Keep setup/bootstrap aligned with the current ChatGPT codex backend behavior:
          # keep `auto` as the explicit standard path, but allow setup UIs to leave this unset by
          # default because the backend rejects the literal `default` enum value with HTTP 400 even
          # though some SDK typings still mention it.
          values: [auto, priority]
          value_labels:
            auto: Standard
            priority: Fast
          description: Processing tier. Set `priority` to emulate Codex `/fast` without changing reasoning effort.
        verbosity:
          prominent: true
          default: medium
          # Control response detail level on GPT-5 series models.
          # Allowed: low | medium | high
          type: enum
          values: [low, medium, high]
          description: Response verbosity/detail level (GPT-5 series).
        temperature:
          # Randomness; use 0–0.2 for tool-calling / deterministic behavior.
          type: number
          min: 0
          max: 2
          description: Sampling temperature (0–2).
        top_p:
          # Nucleus sampling; usually leave unset if using temperature.
          type: number
          min: 0
          max: 1
          description: Nucleus sampling probability (0–1).
        parallel_tool_calls:
          type: boolean
          description: Allow the model to emit parallel tool calls (enable by default in Dominds).
        web_search:
          prominent: true
          default: live
          type: enum
          values: [disabled, cached, live]
          description: Enable native web search tool mode (disabled/cached/live).
        json_response:
          type: boolean
          description: Force JSON object output mode.
    models:
      gpt-5.5:
        name: GPT-5.5
        optimal_max_tokens: 200000
